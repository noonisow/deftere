function Dictionnaire_innitialize(){

}});

function Search_history(){
		suggestions.innerHTML = "";
		const history = variables["history"];
		if (!input.value){

    Object.keys(history).forEach(word => {

      //btn.style.display = "block"; // each button on new line
      btn.id = "btn";
      btn.addEventListener( "click", function(){ find(btn);});
      suggestions.appendChild(btn);
	});
	}
}

input.addEventListener("input", () => {
suggestions.innerHTML = "";
const value = input.value.toLowerCase();
  if (value) {
    const filtered = variables["list_of_words"].filter(word => word.startsWith(value) ).slice(0,20);
    filtered.forEach(word => {
      const btn = document.createElement("button");
      btn.textContent = word;
      btn.style.display = "block"; // each button on new line
      btn.id = "btn";
      btn.addEventListener( "click", function(){ find(btn);});
      suggestions.appendChild(btn);
    });
  }else{Search_history();}
});
}

/**
font-family: Arial - Helvetica - Times New Roman - Georgia - Verdana - Courier New ...

function search( queries ){
	var queries = queries.toLowerCase().trim().split(' ').reverse()
	var phrases = liste.map(phrase => phrase.slice(0,-1))

	for ( query of queries ){
		phrases = phrases.filter( (phrase) => phrase.toLowerCase().includes(query)).sort( (phrase) => phrase.indexOf(query) )
	}
	return phrases;
}

function Submit(b){
	b.innerHTML = document.getElementById("input").value;
	find( b );
	b.innerHTML = "submit";
}

function Add( condition ){
	if ( condition ){ return `class = "query"` }
	return ``;
}

function Split( paragraphe , queries ){
		innerHTML = ``;
		var queries = queries.toLowerCase().trim().split(' ')
		for( word of paragraphe.split(' ') ){
			to_add = Add( queries.includes(word.toLowerCase()) )
			innerHTML += `<button id = "btn" ${to_add} >${word}</button>`;
		}
		return innerHTML;
}

function paragraphes( phrases , queries ){
	var paragraphes = `<button id = "back"><...caggal</button><button id = "next">ieeso...></button>`

	for ( phrase of phrases ){
		paragraphes += `<div id="phrase">${ Split( phrase , queries )}</div>`;
	}
	return paragraphes;
}

function fill( phrases , indexes , queries , lines = 10 ){
	const page = document.getElementById( "page" );
	display = phrases.slice( indexes , indexes+lines )
	page.innerHTML = paragraphes( display , queries );
	b = document.getElementById("back");
	b.addEventListener( "click", function(){ prev_page( phrases , queries , lines );});
	b = document.getElementById("next");
	b.addEventListener( "click", function(){ next_page( phrases , queries , lines );});

	for ( b of document.querySelectorAll("#btn") ){
		b.addEventListener( "click", function(){ 
			Dictionnaire_innitialize();
			find(this);
		});
	}
}

function find( button ){
	queries = button.innerHTML.toLowerCase();
	const history = variables["history"];
	indexes = history[queries];
	if (indexes === undefined ){indexes=0;}
	history[queries] = indexes;
	document.getElementById("input").value = queries;
	phrases = search( queries ); // ko dhooyenne
	fill( phrases , indexes , queries );
}

function next_page( phrases , queries , lines ){
	const history = variables["history"];
	indexes = history[queries] + lines;
	if ( indexes-lines >= phrases.length ){return false;}
	history[queries] = indexes;
	fill( phrases , indexes , queries );
}

function prev_page( phrases , queries , lines ){
	const history = variables["history"];
	indexes = history[queries] - lines;
	if ( indexes+lines < 1 ){return false;}
	history[queries] = indexes;
	fill( phrases , indexes , queries );
}
